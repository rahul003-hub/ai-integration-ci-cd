name: AI Code Review (Ollama)

on:
  push:   # 👈 Trigger on push instead of pull_request
    branches:
      - main   # You can change this to any branch you want

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Pull CodeLlama model
        run: ollama pull codellama

      - name: Install dependencies
        run: npm install

      - name: Run AI review
        run: npm run review
